<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vintage</title>
    <style>
        #loader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.8s ease-out;
        }
    </style>
</head>
<body>
    <div id="loader">
        <p style="color: #fff;">Loading...</p>
    </div>

    <script>
        window.addEventListener('load', () => {
            const loader = document.getElementById('loader');

            // Delay the fade-out by 2 seconds
            setTimeout(() => {
                loader.style.opacity = '0';
                
                // Delay the total removal so the fade animation finishes
                setTimeout(() => {
                    loader.style.display = 'none';
                }, 800);

            }, 2000); 
        });
    </script>
</body>
</html>
