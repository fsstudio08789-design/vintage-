<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VANTAGE | Premium Streetwear</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --primary: #ffffff;
            --accent: #00d2ff;
            --bg-dark: #0a0a0b;
            --bg-card: #161618;
            --glass: rgba(255, 255, 255, 0.05);
            --transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background-color: var(--bg-dark); color: var(--primary); overflow-x: hidden; scroll-behavior: smooth; }

        /* Loader */
        #loader {
            position: fixed; height: 100vh; width: 100%; background: #000;
            display: flex; justify-content: center; align-items: center; z-index: 9999;
            transition: opacity 0.8s ease;
        }
        .loader-logo { font-size: 3rem; font-weight: 800; letter-spacing: 10px; text-transform: uppercase; animation: pulse 1.5s infinite alternate; }
        @keyframes pulse { from { opacity: 0.3; } to { opacity: 1; } }

        /* Navbar */
        nav {
            position: fixed; top: 0; width: 100%; padding: 20px 50px;
            display: flex; justify-content: space-between; align-items: center; z-index: 1000;
            background: rgba(10, 10, 11, 0.8); backdrop-filter: blur(15px); border-bottom: 1px solid var(--glass);
        }

        /* Hero */
        .hero {
            height: 100vh; width: 100%; display: flex; align-items: center; justify-content: center; text-align: center;
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('https://images.unsplash.com/photo-1552374196-1ab2a1c593e8?auto=format&fit=crop&w=1920');
            background-size: cover; background-position: center;
        }
        .hero h1 { font-size: clamp(2.5rem, 8vw, 5rem); font-weight: 800; text-transform: uppercase; margin-bottom: 20px; }

        /* Products */
        .product-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 30px; padding: 50px; }
        .product-card { background: var(--bg-card); border-radius: 10px; overflow: hidden; transition: var(--transition); border: 1px solid var(--glass); }
        .product-card:hover { transform: translateY(-10px); border-color: var(--accent); }
        .product-img { width: 100%; height: 350px; object-fit: cover; }
        .product-info { padding: 20px; }
        .btn-add { width: 100%; padding: 12px; background: transparent; border: 1px solid var(--primary); color: #fff; cursor: pointer; transition: 0.3s; }
        .btn-add:hover { background: #fff; color: #000; }

        /* Floating WhatsApp */
        .whatsapp-float {
            position: fixed; bottom: 30px; right: 30px; background: #25d366;
            width: 60px; height: 60px; border-radius: 50%; display: flex;
            justify-content: center; align-items: center; font-size: 30px; color: white; z-index: 1000;
        }

        #cart-modal {
            position: fixed; right: -100%; top: 0; width: 350px; height: 100vh;
            background: #111; z-index: 2000; padding: 30px; transition: 0.5s;
        }
        #cart-modal.active { right: 0; }
    </style>
</head>
<body>

    <div id="loader"><div class="loader-logo">VANTAGE</div></div>

    <nav>
        <div style="font-weight:800; font-size:1.5rem;">VANTAGE</div>
        <div onclick="toggleCart()" style="cursor:pointer;"><i class="fa-solid fa-bag-shopping"></i> <span id="cart-count">0</span></div>
    </nav>

    <section class="hero">
        <div>
            <h1>PREMIUM STREETWEAR</h1>
            <button onclick="document.getElementById('products').scrollIntoView()" style="padding:15px 30px; cursor:pointer; background:white; font-weight:bold; border:none;">SHOP NOW</button>
        </div>
    </section>

    <div id="products" class="product-grid"></div>

    <div id="cart-modal">
        <h2>Your Bag</h2>
        <div id="cart-items-container" style="margin-top:20px;"></div>
        <div style="margin-top:20px; border-top:1px solid #333; padding-top:10px;">
            <p>Total: <span id="cart-total">₹0</span></p>
            <button onclick="checkout()" style="width:100%; background:var(--accent); padding:10px; margin-top:10px; border:none; font-weight:bold; cursor:pointer;">CHECKOUT VIA WHATSAPP</button>
            <button onclick="toggleCart()" style="width:100%; background:transparent; color:white; border:1px solid #333; padding:10px; margin-top:5px; cursor:pointer;">CLOSE</button>
        </div>
    </div>

    <a href="https://wa.me/919999999999" class="whatsapp-float" target="_blank"><i class="fa-brands fa-whatsapp"></i></a>

    <script>
        const products = [
            { id: 1, name: "Midnight Hoodie", price: 2499, img: "https://images.unsplash.com/photo-1556821840-3a63f95609a7?w=600" },
            { id: 2, name: "Carbon Cargo", price: 1899, img: "https://images.unsplash.com/photo-1594633312681-425c7b97ccd1?w=600" },
            { id: 3, name: "Graphic Tee", price: 999, img: "https://images.unsplash.com/photo-1583743814966-8936f5b7be1a?w=600" }
        ];

        let cart = [];

        window.onload = () => {
            setTimeout(() => { document.getElementById('loader').style.opacity = '0'; 
            setTimeout(() => document.getElementById('loader').style.display = 'none', 800); }, 1500);
            
            document.getElementById('products').innerHTML = products.map(p => `
                <div class="product-card">
                    <img src="${p.img}" class="product-img">
                    <div class="product-info">
                        <h3>${p.name}</h3>
                        <p style="color:var(--accent)">₹${p.price}</p>
                        <button class="btn-add" onclick="addToCart(${p.id})">Add to Bag</button>
                    </div>
                </div>
            `).join('');
        };

        function toggleCart() { document.getElementById('cart-modal').classList.toggle('active'); }

        function addToCart(id) {
            cart.push(products.find(p => p.id === id));
            updateCart();
        }

        function updateCart() {
            document.getElementById('cart-count').innerText = cart.length;
            document.getElementById('cart-total').innerText = `₹${cart.reduce((s, i) => s + i.price, 0)}`;
            document.getElementById('cart-items-container').innerHTML = cart.map((item, index) => `
                <div style="display:flex; justify-content:space-between; margin-bottom:10px;">
                    <span>${item.name}</span>
                    <span>₹${item.price}</span>
                </div>
            `).join('');
        }

        function checkout() {
            if(cart.length === 0) return alert("Bag is empty!");
            const total = document.getElementById('cart-total').innerText;
            const msg = `Hi, I want to order items worth ${total} from Vantage.`;
            window.open(`https://wa.me/919999999999?text=${encodeURIComponent(msg)}`);
        }
    </script>
</body>
</html>
